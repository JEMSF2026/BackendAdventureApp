services:
  db:
    image: mysql:8
    environment:
      MYSQL_DATABASE: mydb
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysqldata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    image: ghcr.io/jemsf2026/backendadventureapp:latest
    environment:
      DATABASE_URL: jdbc:mysql://db:3306/mydb
      DATABASE_USERNAME: root
      DATABASE_PASSWORD: ${DB_PASSWORD}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: ghcr.io/jemsf2026/frontendadventureapp:latest
    ports:
      - "80:80"
    depends_on:
      - app

volumes:
  mysqldata:

services:
  build:
    build:
      context: .
      dockerfile: Dockerfile.build
    working_dir: /app
    volumes:
      - .:/app
      - maven-cache:/root/.m2
    profiles: ["tools"]

  db:
    image: mysql:8
    environment:
      MYSQL_DATABASE: mydb
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysqldata:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    environment:
      DATABASE_URL: jdbc:mysql://db:3306/mydb
      DATABASE_USERNAME: root
      DATABASE_PASSWORD: ${DB_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"

volumes:
  mysqldata:
  maven-cache:
